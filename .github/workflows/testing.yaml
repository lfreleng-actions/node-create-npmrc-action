# Action test/validation workflow
name: "Test GitHub Action 🧪"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  ### Test the GitHub Action in this Repository ###
  tests:
    name: "Test local GitHub Action"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10 # Increase this timeout value as needed
    steps:
      # Load the egress allow-list out-of-band from the
      # organisation's .github repository and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: '@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Test 1: explicit host/repository/user/password
      - name: "Create .npmrc (explicit settings)"
        id: explicit
        uses: ./
        with:
          nexus_host: "nexus3.example.org"
          nexus_repository: "npm.snapshot"
          nexus_user: "testuser"
          nexus_password: "testpass"
          path: "/tmp/npmrc-explicit"

      - name: "Verify explicit .npmrc"
        shell: bash
        env:
          NPMRC: ${{ steps.explicit.outputs.npmrc_path }}
          REG: ${{ steps.explicit.outputs.registry_url }}
        run: |
          # Verify the explicitly configured .npmrc
          set -euo pipefail
          if [ -z "${NPMRC}" ] || [ ! -f "${NPMRC}" ]; then
            echo "Error: .npmrc was not created ❌"
            exit 1
          fi
          expected_reg="https://nexus3.example.org/repository/npm.snapshot/"
          if [ "${REG}" != "${expected_reg}" ]; then
            echo "Error: registry_url mismatch: ${REG} ❌"
            exit 1
          fi
          if ! grep -Fqx "registry=${expected_reg}" "${NPMRC}"; then
            echo "Error: registry line missing ❌"
            exit 1
          fi
          expected_auth=$(printf '%s:%s' "testuser" "testpass" \
            | base64 | tr -d '\n')
          auth_line="//nexus3.example.org/repository/npm.snapshot/"
          auth_line="${auth_line}:_auth=${expected_auth}"
          if ! grep -Fqx "${auth_line}" "${NPMRC}"; then
            echo "Error: auth line missing or incorrect ❌"
            exit 1
          fi
          if ! grep -Fqx "always-auth=true" "${NPMRC}"; then
            echo "Error: always-auth line missing ❌"
            exit 1
          fi
          perms=$(stat -c '%a' "${NPMRC}")
          if [ "${perms}" != "600" ]; then
            echo "Error: .npmrc permissions are ${perms}, expected 600 ❌"
            exit 1
          fi
          echo "Explicit .npmrc verified ✅" >> "$GITHUB_STEP_SUMMARY"

      # Test 2: default host derivation (nexus3.<owner>.org)
      - name: "Create .npmrc (default host)"
        id: defaults
        uses: ./
        with:
          nexus_user: "deploy"
          nexus_password: "secret-token"
          path: "/tmp/npmrc-default"

      - name: "Verify default host derivation"
        shell: bash
        env:
          NPMRC: ${{ steps.defaults.outputs.npmrc_path }}
          REG: ${{ steps.defaults.outputs.registry_url }}
          OWNER: ${{ github.repository_owner }}
        run: |
          # Verify the host defaulted to nexus3.<owner>.org
          set -euo pipefail
          expected="https://nexus3.${OWNER}.org/repository/npm.snapshot/"
          if [ "${REG}" != "${expected}" ]; then
            echo "Error: default registry mismatch: ${REG} ❌"
            echo "Expected: ${expected}"
            exit 1
          fi
          if ! grep -Fqx "registry=${expected}" "${NPMRC}"; then
            echo "Error: default registry line missing ❌"
            exit 1
          fi
          echo "Default host derivation verified ✅" \
            >> "$GITHUB_STEP_SUMMARY"

      # Test 3: failure when no password is available
      - name: "Create .npmrc with no password [expected failure]"
        id: failure
        continue-on-error: true
        uses: ./
        with:
          nexus_host: "nexus3.example.org"
          nexus_user: "testuser"

      - name: "Error if missing-password run did NOT fail"
        if: steps.failure.outcome == 'success'
        shell: bash
        run: |
          # Failure testing is also important
          echo "Error: action succeeded without a password ❌"
          exit 1
